# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:nexoradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:nexora_admin}
spring.datasource.password=${DB_PASSWORD:}

# Consola H2 (solo para desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Servicios externos
nexora.external.notification-url=${NOTIFICATION_URL:https://notify.nexora.com/api/v2}
nexora.external.api-key=${EXTERNAL_API_KEY:}
nexora.external.erp-endpoint=${ERP_ENDPOINT:https://erp.nexora.internal/sync}
nexora.external.auth-secret=${AUTH_SECRET:}

server.port=8080
